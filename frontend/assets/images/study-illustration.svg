<!-- frontend/assets/images/study-illustration.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad)" rx="20"/>
  
  <!-- Desk -->
  <rect x="150" y="280" width="300" height="15" rx="4" fill="#64748B"/>
  <rect x="170" y="295" width="10" height="60" fill="#475569"/>
  <rect x="420" y="295" width="10" height="60" fill="#475569"/>
  
  <!-- Person -->
  <circle cx="300" cy="200" r="35" fill="#94A3B8"/>
  <rect x="280" y="235" width="40" height="45" rx="10" fill="#64748B"/>
  
  <!-- Flashcard -->
  <rect x="230" y="260" width="80" height="50" rx="8" fill="#3B82F6" opacity="0.8" transform="rotate(-5, 270, 285)"/>
  <text x="270" y="290" text-anchor="middle" fill="white" font-size="12" font-weight="bold" transform="rotate(-5, 270, 285)">$E=mc^2$</text>
  
  <!-- Floating elements -->
  <rect x="100" y="100" width="60" height="40" rx="6" fill="#10B981" opacity="0.3" transform="rotate(10, 130, 120)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="420" y="80" width="50" height="35" rx="6" fill="#F59E0B" opacity="0.3" transform="rotate(-15, 445, 97)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <circle cx="80" cy="180" r="8" fill="#EF4444" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-25; 0,0" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="500" cy="200" r="6" fill="#8B5CF6" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>