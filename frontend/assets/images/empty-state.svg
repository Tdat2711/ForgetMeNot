<!-- frontend/assets/images/empty-state.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="none"/>
  
  <!-- Books Stack -->
  <g transform="translate(150, 100)">
    <!-- Book 1 -->
    <rect x="0" y="60" width="100" height="15" rx="2" fill="#3B82F6" opacity="0.3"/>
    <rect x="2" y="45" width="96" height="15" rx="2" fill="#8B5CF6" opacity="0.4"/>
    <rect x="4" y="30" width="92" height="15" rx="2" fill="#10B981" opacity="0.5"/>
    <rect x="6" y="15" width="88" height="15" rx="2" fill="#F59E0B" opacity="0.6"/>
    
    <!-- Book spines -->
    <line x1="15" y1="15" x2="15" y2="75" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <line x1="50" y1="15" x2="50" y2="75" stroke="white" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Floating cards -->
    <rect x="120" y="20" width="60" height="40" rx="4" fill="white" opacity="0.1" transform="rotate(15, 150, 40)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="140" y="0" width="50" height="35" rx="4" fill="white" opacity="0.08" transform="rotate(-10, 165, 17)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94A3B8" font-weight="bold">
    Chưa có dữ liệu
  </text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">
    Bắt đầu tạo bộ thẻ đầu tiên của bạn
  </text>
</svg>