
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="authGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#3B82F6" opacity="0.1"/>
    </pattern>
  </defs>
  
  <rect width="1440" height="900" fill="url(#authGradient)"/>
  <rect width="1440" height="900" fill="url(#dots)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="300" fill="#3B82F6" opacity="0.03"/>
  <circle cx="1200" cy="700" r="400" fill="#8B5CF6" opacity="0.03"/>
  <circle cx="700" cy="450" r="200" fill="#10B981" opacity="0.02"/>
</svg>