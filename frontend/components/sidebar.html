<!-- frontend/components/sidebar.html -->
<template id="sidebarTemplate">
    <aside class="sidebar" id="sidebar">
        <!-- Logo & Toggle -->
        <div class="sidebar-header">
            <a href="dashboard.html" class="sidebar-logo">
                <i class="fas fa-brain"></i>
                <span class="logo-text">ForgetMeNot</span>
            </a>
            <button class="sidebar-toggle" id="sidebarToggle" title="Thu gọn menu">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="decks.html" class="nav-item">
                <i class="fas fa-layer-group"></i>
                <span>Kho Thẻ</span>
            </a>
            <a href="study.html" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>Ôn Tập</span>
                <span class="badge badge-danger hidden" id="dueCardsBadge">0</span>
            </a>
            <a href="statistics.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Thống Kê</span>
            </a>
            
            <!-- Divider -->
            <div class="nav-divider"></div>
            
            <!-- Yêu thích -->
            <div class="nav-section-title">
                <span>YÊU THÍCH</span>
            </div>
            <div id="sidebarFavorites">
                <!-- Favorites loaded dynamically -->
            </div>
        </nav>

        <!-- User Info -->
        <div class="sidebar-footer">
            <div class="sidebar-user" onclick="window.location.href='settings.html'">
                <img src="../assets/images/default-avatar.png" 
                     alt="Avatar" 
                     class="user-avatar"
                     id="sidebarAvatar">
                <div class="user-info">
                    <span class="user-name" id="sidebarUsername">User</span>
                    <span class="user-email" id="sidebarEmail">user@email.com</span>
                </div>
                <button class="btn-icon btn-sm" id="logoutBtn" title="Đăng xuất">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
</template>
