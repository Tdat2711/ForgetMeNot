<!-- frontend/components/confirm-dialog.html -->
<div class="modal-overlay" id="confirmDialog">
    <div class="modal modal-sm">
        <div class="modal-body" style="text-align: center; padding: 32px;">
            <div class="confirm-icon" id="confirmIcon">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirmTitle">Xác nhận</h3>
            <p id="confirmMessage">Bạn có chắc chắn muốn thực hiện hành động này?</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="confirmCancel">
                    Hủy
                </button>
                <button class="btn btn-danger" id="confirmOk">
                    Xác nhận
                </button>
            </div>
        </div>
    </div>
</div>
