<!-- frontend/components/error-state.html -->
<div class="error-state">
    <div class="error-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h3 class="error-title">Đã xảy ra lỗi</h3>
    <p class="error-message">Không thể tải dữ liệu. Vui lòng thử lại sau.</p>
    <div class="error-actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
            <i class="fas fa-redo"></i>
            Thử lại
        </button>
        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-home"></i>
            Về trang chủ
        </button>
    </div>
</div>
